version: '3.8'

services:
  web:
    build: .
    restart: always
    volumes:
      - ./data:/app/data
      - ./traceroute.db:/app/traceroute.db
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web